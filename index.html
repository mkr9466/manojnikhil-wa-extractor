<!DOCTYPE html>
<html>

<head>
    <title>WhatsApp Member Extractor</title>

    <style>

        body{
            font-family: Arial;
            text-align:center;
            margin-top:100px;
            background:#f0f2f5;
        }

        .box{
            background:white;
            width:400px;
            margin:auto;
            padding:40px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.1);
        }

        button{
            background:#25D366;
            color:white;
            border:none;
            padding:15px 30px;
            font-size:20px;
            border-radius:10px;
            cursor:pointer;
        }

        button:hover{
            opacity:0.9;
        }

    </style>
</head>

<body>

    <div class="box">

        <h1>WhatsApp Member Extractor</h1>

        <p>
            Download the Chrome Extension and export WhatsApp group members into Excel.
        </p>

        <a href="https://github.com/mkr9466/manojnikhil-wa-extractor/archive/refs/heads/main.zip">

            <button>
                Download Extension
            </button>

        </a>

        <br><br>

        <p>
            After download:
            <br><br>
            1. Extract ZIP
            <br>
            2. Open chrome://extensions
            <br>
            3. Turn ON Developer Mode
            <br>
            4. Click Load Unpacked
            <br>
            5. Select extracted folder
        </p>

    </div>
